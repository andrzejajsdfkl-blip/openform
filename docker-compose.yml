version: '3.9'

services:
  openform-studio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: openform-studio
    ports:
      - "9002:9002"
    environment:
      NODE_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEXT_PUBLIC_API_URL: http://localhost:9002
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9002"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - openform-network
    volumes:
      - openform-data:/app/.next/cache

networks:
  openform-network:
    driver: bridge

volumes:
  openform-data:
    driver: local
